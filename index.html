*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Sarabun',Arial,sans-serif;overflow:hidden;background:#040c18;color:#e2e8f0}

/* ── TOP BAR ── */
#bar{
  position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(4,12,26,0.97);border-bottom:1px solid rgba(96,165,250,0.15);
  display:flex;align-items:center;gap:6px;padding:7px 12px;flex-wrap:wrap;min-height:48px;
}
#bar h1{
  font-size:15px;font-weight:800;white-space:nowrap;
  background:linear-gradient(90deg,#38bdf8,#818cf8);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.fb{
  padding:4px 10px;border-radius:7px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);color:#64748b;
  font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;
}
.fb:hover{background:rgba(255,255,255,0.1);color:#e2e8f0}
.fb.on{border-color:var(--c);background:rgba(var(--cr),0.13);color:var(--c)}
#cnt{font-size:10px;color:#334155;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);border-radius:6px;padding:3px 8px;white-space:nowrap}

/* ── MAP ── */
#map{position:fixed;top:48px;left:0;right:0;bottom:0}

/* ── LEGEND ── */
#leg{
  position:fixed;bottom:26px;left:10px;z-index:999;
  background:rgba(4,12,26,0.95);border:1px solid rgba(96,165,250,0.12);
  border-radius:12px;padding:11px 13px;min-width:168px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
.lt{font-size:8px;color:#334155;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.lr{display:flex;align-items:center;gap:7px;margin-bottom:5px;cursor:pointer;border-radius:6px;padding:2px 4px;transition:background .15s}
.lr:hover{background:rgba(255,255,255,0.05)}
.ld{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.ln{font-size:11px;font-weight:700}.lsub{font-size:9px;color:#475569;margin-left:2px}
.lhr{height:1px;background:rgba(255,255,255,0.06);margin:7px 0}
.lf{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.lfd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lfn{font-size:10px;color:#94a3b8}

/* ── POPUP ── */
.leaflet-popup-content-wrapper{
  background:rgba(5,14,30,0.98)!important;border:1px solid rgba(96,165,250,0.15)!important;
  border-radius:12px!important;box-shadow:0 8px 32px rgba(0,0,0,.7)!important;padding:0!important;
}
.leaflet-popup-content{margin:0!important;min-width:230px;max-width:280px}
.leaflet-popup-tip{background:rgba(5,14,30,0.98)!important}
.leaflet-popup-close-button{color:#475569!important;top:8px!important;right:10px!important;font-size:16px!important}
.pu{padding:14px 16px}
.pub{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.pun{font-size:15px;font-weight:800;color:#e2e8f0;line-height:1.2;margin-bottom:3px}
.pua{font-size:10px;color:#475569;margin-bottom:7px}
.pum{display:flex;gap:12px;font-size:11px;color:#64748b;margin-bottom:8px;flex-wrap:wrap}
.puf{display:flex;flex-wrap:wrap;gap:3px}
.fc{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:16px;font-size:10px;font-weight:700;margin:2px}
.evc{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:16px;
  background:rgba(124,58,237,.12);border:1.5px solid rgba(167,139,250,.35);
  color:#a78bfa;font-size:10px;font-weight:700;margin:2px}
.gmlink{
  display:block;margin-top:8px;padding:6px;border-radius:8px;text-align:center;
  background:rgba(56,189,248,0.08);border:1px solid rgba(56,189,248,0.2);
  color:#38bdf8;font-size:11px;font-weight:700;text-decoration:none;
  transition:background .15s;
}
.gmlink:hover{background:rgba(56,189,248,0.15)}

/* ── MARKER ── */
.mi{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:800;color:#fff;border:2.5px solid;
  box-shadow:0 2px 12px rgba(0,0,0,.6);position:relative;cursor:pointer;transition:transform .15s;
}
.mi:hover{transform:scale(1.18)}
.fdots{position:absolute;top:-9px;left:50%;transform:translateX(-50%);display:flex;gap:2px}
.fdot{width:6px;height:6px;border-radius:50%;border:1px solid rgba(0,0,0,.4)}
.evbg{position:absolute;top:-5px;right:-5px;width:13px;height:13px;border-radius:50%;

.rlab{background:transparent!important;border:none!important;box-shadow:none!important;

.rlab::before{display:none!important}
</style>

  {br:"PTT",nm:"PTT PTTOR สาโมคแห",     la:16.8177,ln:100.3190,fu:["D","95","91","E20","E85"],ev:1,h:"24 ชั่วโมง",r:4.5,ad:"ต.สมอแข",gm:"https://maps.google.com/?cid=16722204274238617567"},

  {br:"PT",nm:"PT อรัญญิก",              la:16.8169,ln:100.2999,fu:["D","95","91"],      ev:0,h:"เปิดบางเวลา",r:3.9,ad:"ต.อรัญญิก",   gm:"https://goo.gl/maps/pt-aran"},

  {br:"Shell",nm:"Shell มิตรภาพ ซ.27",  la:16.8186,ln:100.2942,fu:["D","95","91"],ev:0,h:"06:00–21:30",r:4.3,ad:"ถ.มิตรภาพ ซ.27",gm:"https://maps.google.com/?cid=15748828751542874435"},
  {br:"Shell",nm:"Shell สิงหวัฒน์",      la:16.8263,ln:100.2551,fu:["D","95","91"],ev:0,h:"24 ชั่วโมง", r:4.3,ad:"ถ.สิงหวัฒน์",gm:"https://maps.google.com/?cid=15705727626439290679"},
  {br:"Shell",nm:"Shell ท่าทอง",         la:16.7984,ln:100.2139,fu:["D","95","91"],ev:0,h:"05:00–00:00",r:4.4,ad:"ต.ท่าทอง",    gm:"https://maps.google.com/?cid=7738775158029617715"},

  {br:"Bangchak",nm:"Bangchak พญาเสือ",  la:16.8259,ln:100.2688,fu:["D","95","91"],ev:1,h:"24 ชั่วโมง",r:4.4,ad:"ถ.พญาเสือ",    gm:"https://maps.google.com/?cid=4973144057051639559"},
  {br:"Bangchak",nm:"Bangchak บรมไตรโลกนาถ",la:16.8027,ln:100.2505,fu:["D","95","91"],ev:0,h:"24 ชั่วโมง",r:4.4,ad:"ถ.บรมไตรโลกนาถ",gm:"https://maps.google.com/?cid=14365035122346418216"},
  {br:"Bangchak",nm:"Bangchak M.T.S.P.", la:16.8116,ln:100.2611,fu:["D","95","91"],ev:0,h:"04:00–22:00",r:4.2,ad:"ถ.บรมไตรโลกนาถ",gm:"https://maps.google.com/?cid=10607919134011782522"},
  // Caltex
  {br:"Caltex",nm:"Caltex ไผ่ชุมแสง",   la:16.8433,ln:100.2314,fu:["D","95","91"],ev:0,h:"05:00–22:00",r:4.1,ad:"ต.ไผ่ชุมแสง",gm:"https://maps.google.com/?cid=12476260579288963999"},
  {br:"Caltex",nm:"Caltex บ้านกร่าง",   la:16.8679,ln:100.2111,fu:["D","95","91"],ev:0,h:"06:00–18:00",r:4.5,ad:"ต.บ้านกร่าง", gm:"https://maps.google.com/?cid=7176090918405240969"},
];

/* ── MAP ── */
var map=L.map('map',{center:[16.810,100.266],zoom:13,zoomControl:false});
L.control.zoom({position:'bottomright'}).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com">CARTO</a>',
  subdomains:'abcd',maxZoom:19
}).addTo(map);

/* 15km circle */
L.circle([16.820,100.266],{
  radius:15000,color:'#60a5fa',opacity:.28,weight:1.5,
  fill:true,fillColor:'#60a5fa',fillOpacity:.03,dashArray:'8 6'
}).addTo(map);

/* center dot */
L.circleMarker([16.820,100.266],{
  radius:6,color:'#38bdf8',fillColor:'#38bdf8',fillOpacity:.9,weight:2
}).bindTooltip('ใจกลางเมืองพิษณุโลก',{permanent:false,direction:'right',offset:[8,0],className:'rlab'})
  .addTo(map);

/* ── MARKERS ── */
var mkrs=[];

function mkIcon(s){
  var bc=B[s.br];
  var dots=s.fu.slice(0,3).map(function(f){
    return '<div class="fdot" style="background:'+FC[f]+'"></div>';
  }).join('');
  var ev=s.ev?'<div class="evbg">⚡</div>':'';
  return L.divIcon({
    className:'',
    html:'<div class="mi" style="background:'+bc.bg+';border-color:'+bc.bo+'">'
        +'<div class="fdots">'+dots+'</div>'+bc.tx+ev+'</div>',
    iconSize:[32,32],iconAnchor:[16,28],popupAnchor:[0,-28]
  });
}

function mkPopup(s){
  var bc=B[s.br];
  var stars='★'.repeat(Math.round(s.r))+'☆'.repeat(5-Math.round(s.r));
  var chips=s.fu.map(function(f){
    return '<span class="fc" style="background:'+FC[f]+'18;border:1.5px solid '+FC[f]+'55;color:'+FC[f]+'">'
          +'<span style="width:6px;height:6px;border-radius:50%;background:'+FC[f]+';display:inline-block"></span>'
          +FL[f]+'</span>';
  }).join('');
  var evb=s.ev?'<span class="evc">⚡ EV Charging</span>':'';
  return '<div class="pu">'
    +'<div class="pub" style="color:'+bc.co+'">'+s.br+'</div>'
    +'<div class="pun">'+s.nm+'</div>'
    +'<div class="pua">📍 '+s.ad+'</div>'
    +'<div class="pum"><span>🕐 '+s.h+'</span><span style="color:#fbbf24">'+stars+' '+s.r+'</span></div>'
    +'<div class="puf">'+chips+evb+'</div>'
    +'<a class="gmlink" href="'+s.gm+'" target="_blank" rel="noopener">🗺 เปิดใน Google Maps</a>'
    +'</div>';
}

ST.forEach(function(s){
  var m=L.marker([s.la,s.ln],{icon:mkIcon(s),title:s.nm,riseOnHover:true})
    .bindPopup(mkPopup(s),{maxWidth:290,minWidth:230});
  m._br=s.br;
  m.addTo(map);
  mkrs.push(m);
});

/* ── FILTER ── */
function sf(f){
  document.querySelectorAll('[id^="fb-"]').forEach(function(b){b.classList.remove('on')});
  document.getElementById('fb-'+f).classList.add('on');
  var n=0;
  mkrs.forEach(function(m){
    if(f==='ALL'||m._br===f){if(!map.hasLayer(m))map.addLayer(m);n++;}
    else{if(map.hasLayer(m))map.removeLayer(m);}
  });
  document.getElementById('cnt').textContent=n+' สาขา';
}
</script>
